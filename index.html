<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de Inicio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #007BFF;
            color: white;
            padding: 10px;
            text-align: center;
        }
        main {
            background: white;
            padding: 20px;
            border-radius: 5px;
        }
        a {
            color: #007BFF;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bienvenido a mi página</h1>
    </header>
    <main>
        <h2>Sobre mí</h2>
        <p>Este es un ejemplo de página HTML sencilla creada como <code>index.html</code>.</p>
        <p>Puedes modificar este texto y agregar más secciones según tus necesidades.</p>
        <a href="https://www.example.com">Visitar ejemplo</a>
    </main>
</body>
</html>
